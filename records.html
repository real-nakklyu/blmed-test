<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Better Life Medical - Saved Records</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="portal.css"/>
</head>
<body class="portal-body" data-page="records">
  <main class="portal-shell">
    <section class="portal-panel">
      <div class="portal-topbar">
        <div class="portal-brand">
          <h1>Saved Records</h1>
          <p>Search by patient name or date of birth, then reopen the DWO in the form page.</p>
        </div>
        <div class="portal-nav">
          <a class="btn btn-ghost portal-link" href="index.html">Home</a>
          <a class="btn btn-ghost portal-link" href="profile.html">Profile</a>
          <button class="btn btn-stamp" type="button" onclick="portalSignOut()">Sign Out</button>
        </div>
      </div>

      <div class="portal-field" style="max-width:420px;">
        <label for="records-search">Search</label>
        <input id="records-search" type="text" placeholder="Patient name or DOB"/>
      </div>

      <div class="portal-status" id="records-status">Loading records...</div>
      <div class="records-list" id="records-list"></div>
    </section>
  </main>

  <script src="portal.js"></script>
</body>
</html>
