<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Better Life Medical - Profile</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="portal.css"/>
</head>
<body class="portal-body" data-page="profile">
  <main class="portal-shell">
    <section class="portal-panel" style="max-width:760px;">
      <div class="portal-topbar">
        <div class="portal-brand">
          <h1>Profile</h1>
          <p>Manage the staff details used for the fax cover and saved record ownership label.</p>
        </div>
        <div class="portal-nav">
          <a class="btn btn-ghost portal-link" href="index.html">Home</a>
          <a class="btn btn-ghost portal-link" href="records.html">Saved Records</a>
          <button class="btn btn-stamp" type="button" onclick="portalSignOut()">Sign Out</button>
        </div>
      </div>

      <div class="portal-form">
        <div class="portal-field">
          <label for="profile-email">Email</label>
          <input id="profile-email" type="email" readonly/>
        </div>
        <div class="portal-field">
          <label for="profile-display-label">Display Label</label>
          <input id="profile-display-label" type="text" placeholder="Example: Stewie - Case Management"/>
        </div>
        <div class="portal-field">
          <label for="profile-first-name">First Name</label>
          <input id="profile-first-name" type="text" placeholder="First name"/>
        </div>
        <div class="portal-field">
          <label for="profile-last-name">Last Name</label>
          <input id="profile-last-name" type="text" placeholder="Last name"/>
        </div>
        <div class="portal-field">
          <label for="profile-extension">Extension</label>
          <input id="profile-extension" type="text" placeholder="Extension"/>
        </div>
      </div>

      <div class="portal-actions">
        <button class="btn btn-stamp" id="profile-save-button" type="button" onclick="portalSaveProfile()">Save Profile</button>
      </div>

      <div class="portal-status" id="profile-status">Profile changes save to your cloud account.</div>
    </section>
  </main>

  <script src="portal.js"></script>
</body>
</html>
